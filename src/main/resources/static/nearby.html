<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Nearby Friends - Connectify</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .nearby-card {
      border: 1px dashed rgba(255,255,255,0.15);
      margin-bottom: 12px;
    }
    .reaction-badge {
      display: inline-block;
      padding: 4px 8px;
      font-size: 11px;
      font-weight: 600;
      border-radius: 6px;
      margin-top: 5px;
    }
    .badge-like { background: rgba(34, 197, 94, 0.2); color: #22c55e; }
    .badge-dislike { background: rgba(239, 68, 68, 0.2); color: #ef4444; }
    .badge-heart { background: rgba(236, 72, 153, 0.2); color: #ec4899; }
    .action-btn-group {
      display: flex;
      gap: 6px;
      margin-top: 8px;
      flex-wrap: wrap;
    }
    .action-btn-group button {
      width: auto;
      padding: 6px 12px;
      font-size: 12px;
      border-radius: 8px;
    }
  </style>
</head>
<body onload="initNearbyPage()">

  <div class="container" style="max-width: 500px;">
    <div class="brand-header" style="margin-bottom: 20px;">
      <svg class="brand-logo-svg" viewBox="0 0 24 24" width="40" height="40" stroke="currentColor" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
        <circle cx="12" cy="10" r="2" fill="currentColor"></circle>
      </svg>
      <h2 style="font-size: 22px;">People Nearby</h2>
    </div>

    <!-- Location coordinates tracking status -->
    <div class="current-user-profile" style="margin-bottom: 25px; padding: 12px 16px; background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 14px;">
      <div style="font-size: 12px; color: #94a3b8;">Your Location:</div>
      <div id="locationStatus" style="font-weight: 500; font-size: 13px; color: #a855f7; margin-top: 4px;">Acquiring coordinates...</div>
    </div>

    <!-- List of Users within 200m -->
    <h3>People Nearby (within 200m)</h3>
    <div id="nearbyUserList" style="display: flex; flex-direction: column; gap: 12px; max-height: 250px; overflow-y: auto; margin-bottom: 25px; padding-right: 4px;">
      <p style="text-align: center; color: #94a3b8; padding: 15px 0;">Searching for nearby users...</p>
    </div>

    <hr>

    <!-- Pokes Inbox section -->
    <h3>Received Pokes</h3>
    <div id="receivedPokesList" style="display: flex; flex-direction: column; gap: 12px; max-height: 250px; overflow-y: auto; margin-bottom: 25px; padding-right: 4px;">
      <p style="text-align: center; color: #94a3b8; padding: 15px 0;">No pokes received yet.</p>
    </div>

    <!-- Back Button -->
    <button class="logout-btn" onclick="window.location.href='users.html'" style="background: rgba(255, 255, 255, 0.06); border: 1px solid rgba(255, 255, 255, 0.08); color: #e2e8f0;">
      Back to Friends
    </button>
  </div>

  <script src="jquery.js"></script>
  <script src="nearby.js"></script>
  <script src="config.js"></script> <!-- Add this line -->

</body>
</html>
