<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Users - Connectify</title>
  <link rel="stylesheet" href="style.css">
</head>
<body onload="loadFriends()">

  <div class="container">
    <div class="brand-header" style="margin-bottom: 20px;">
      <svg class="brand-logo-svg" viewBox="0 0 24 24" width="40" height="40" stroke="currentColor" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
        <circle cx="12" cy="10" r="2" fill="currentColor"></circle>
      </svg>
      <h2 style="font-size: 22px;">Connectify</h2>
    </div>

	<!-- Logged in User Profile Bar -->
	<div class="current-user-profile" style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 25px; padding: 12px 16px; background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 14px;">
	  <div style="display: flex; align-items: center; gap: 12px;">
	    <div id="currentUserAvatar" class="user-avatar" style="width: 36px; height: 36px; font-size: 14px;">?</div>
	    <div>
	      <span id="currentUserName" style="font-weight: 600; font-size: 15px; color: #f8fafc; display: block;">User</span>
	      <span style="font-size: 11.5px; color: #94a3b8; display: block;">Your ID: <strong id="currentUserId" style="color: #a855f7;">-</strong></span>
	    </div>
	  </div>
	  <div style="width: 8px; height: 8px; background: #22c55e; border-radius: 50%; box-shadow: 0 0 8px #22c55e;" title="Online"></div>
	</div>

	
	<button onclick="window.location.href='nearby.html'" style="background: linear-gradient(135deg, #a855f7, #ec4899); margin-top: 10px;">
	  🔍 Find People Nearby
	</button>
	
	
    <h3>Add Contact</h3>
    <div class="add-friend-section">
      <input type="number" id="friendIdInput" placeholder="Friend's User ID">
      <button onclick="addFriend()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Add
      </button>
    </div>

    <hr>

    <h3>Active Chats</h3>
    <div id="userList"></div>

    <button class="logout-btn" onclick="logout()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      Sign Out
    </button>
  </div>

  <script src="jquery.js"></script>
  <script src="config.js"></script>
  <script src="users.js"></script>
</body>
</html>
